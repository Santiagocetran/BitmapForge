name: Bug report
description: Report a bug in BitmapForge
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Upload a model (GLB/STL/OBJ)
        2. Change setting X to Y
        3. Click Export
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: model-format
    attributes:
      label: Model format
      description: What file format were you using when the bug occurred?
      options:
        - GLB
        - GLTF
        - OBJ
        - STL
        - Not applicable
    validations:
      required: false

  - type: dropdown
    id: export-format
    attributes:
      label: Export format
      description: Were you exporting when the bug occurred?
      options:
        - GIF
        - Video (MP4/WebM)
        - Sprite sheet (PNG)
        - Code ZIP
        - Not exporting
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots or recording
      description: For visual/rendering bugs, a screenshot or screen recording is very helpful. Drag and drop images here.
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      description: e.g. Chrome 124 on macOS 14, Firefox 125 on Windows 11
    validations:
      required: true
