name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Unit tests
        run: npx vitest run --max-workers=50%
      - name: Build
        run: npm run build
      - name: Build embed package
        run: cd packages/embed && npm install && npm run build
      - name: Assert embed bundle size ≤ 50 KB
        run: |
          SIZE=$(gzip -c packages/embed/dist/bitmap-forge.es.js | wc -c)
          echo "Embed bundle gzipped size: ${SIZE} bytes"
          if [ "$SIZE" -gt 51200 ]; then
            echo "ERROR: embed bundle exceeds 50 KB limit (${SIZE} bytes > 51200)"
            exit 1
          fi
          echo "OK: ${SIZE} bytes ≤ 51200"
      - name: Verify no alias leakage in embed dist
        run: |
          if grep -r "@engine" packages/embed/dist/; then
            echo "ERROR: @engine alias leaked into dist"
            exit 1
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root deps
        run: npm ci
      - name: Build CLI headless bundle
        run: cd packages/cli && npm install && npm run build
      - name: Run CLI unit tests
        run: cd packages/cli && npm test
